version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: loansp-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  loan-calc-mcp:
    build:
      context: ./loansp-ai/loan_calc_mcp_server
      dockerfile: Dockerfile
    container_name: loansp-loan-calc-mcp
    ports:
      - "8001:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/sse')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  product-mcp:
    build:
      context: ./loansp-ai/product_mcp_server
      dockerfile: Dockerfile
    container_name: loansp-product-mcp
    ports:
      - "8002:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/sse')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  knowledge-mcp:
    build:
      context: ./loansp-ai/knowledge_mcp_server
      dockerfile: Dockerfile
    container_name: loansp-knowledge-mcp
    ports:
      - "8003:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/sse')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./loansp-ai/backend
      dockerfile: Dockerfile
    container_name: loansp-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API=${GROQ_API}
      - ENVIRONMENT=production
      - MODEL_NAME=openai/gpt-oss-20b
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOAN_CALC_MCP_URL=http://loan-calc-mcp:8000/sse
      - PRODUCT_MCP_URL=http://product-mcp:8000/sse
      - KNOWLEDGE_MCP_URL=http://knowledge-mcp:8000/sse
    depends_on:
      redis:
        condition: service_healthy
      loan-calc-mcp:
        condition: service_healthy
      product-mcp:
        condition: service_healthy
      knowledge-mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

networks:
  default:
    name: loansp-network
