<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Chatbot</title>
    
    <!-- Chỉ dùng một bộ Bootstrap thôi -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css" integrity="sha384-B4dIYHKNBt8Bc12p+WXckhzcICo0wtJAoU8YZTY5qE0Id1GSseTk6S+L3BlXeVIU" crossorigin="anonymous">
    
    <!-- Chỉ dùng một jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    
    <!-- Sửa đường dẫn static cho FastAPI -->
    <link rel="stylesheet" type="text/css" href="/static/style.css"/>
    
    <style>
        /* Thêm style phòng trường hợp file CSS không load */
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .chat {
            margin-top: 50px;
        }
        .msg_card_body {
            height: 400px;
            overflow-y: auto;
            padding: 15px;
        }
        .msg_cotainer {
            max-width: 70%;
            background-color: #f0f0f0;
            border-radius: 15px;
            padding: 10px 15px;
            margin-bottom: 10px;
        }
        .msg_cotainer_send {
            max-width: 70%;
            background-color: #007bff;
            color: white;
            border-radius: 15px;
            padding: 10px 15px;
            margin-bottom: 10px;
        }
        .msg_time {
            font-size: 0.7em;
            color: #6c757d;
            margin-top: 5px;
            display: block;
        }
        .msg_time_send {
            font-size: 0.7em;
            color: #d1d1d1;
            margin-top: 5px;
            display: block;
        }
        .user_img_msg {
            height: 40px;
            width: 40px;
            margin: 0 10px;
        }
        .send_btn {
            background-color: #007bff;
            color: white;
            border: none;
        }
        .type_msg {
            border: 1px solid #ced4da;
            border-radius: 20px;
        }
        .card-header {
            background-color: #007bff;
            color: white;
            border-bottom: 0;
        }
    </style>
</head>

<body>
    <div class="container-fluid h-100">
        <div class="row justify-content-center h-100">		
            <div class="col-md-8 col-xl-6 chat">
                <div class="card">
                    <div class="card-header msg_head">
                        <div class="d-flex bd-highlight">
                            <div class="img_cont">
                                <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img" alt="Chatbot Icon">
                                <span class="online_icon"></span>
                            </div>
                            <div class="user_info">
                                <span>Medical Chatbot</span>
                                <p>Ask me anything about medical topics!</p>
                            </div>
                        </div>
                    </div>
                    <div id="messageFormeight" class="card-body msg_card_body">
                        <!-- Messages will appear here -->
                        <div class="d-flex justify-content-start mb-4">
                            <div class="img_cont_msg">
                                <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img_msg" alt="Bot Icon">
                            </div>
                            <div class="msg_cotainer">
                                Hello! I'm your medical assistant. How can I help you today?
                                <span class="msg_time" id="current-time">Loading...</span>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <form id="messageArea" class="input-group">
                            <input type="text" id="text" name="msg" placeholder="Type your message..." autocomplete="off" class="form-control type_msg" required/>
                            <div class="input-group-append">
                                <button type="submit" id="send" class="input-group-text send_btn">
                                    <i class="fas fa-location-arrow"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (optional) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>

    <script>
        // Hiển thị thời gian hiện tại
        function updateTime() {
            const now = new Date();
            const timeString = now.getHours().toString().padStart(2, '0') + ':' + 
                              now.getMinutes().toString().padStart(2, '0');
            document.getElementById('current-time').textContent = timeString;
        }
        updateTime();
        setInterval(updateTime, 60000); // Cập nhật mỗi phút
        
        $(document).ready(function() {
            // Cuộn xuống cuối khi trang load
            $('.msg_card_body').scrollTop($('.msg_card_body')[0].scrollHeight);
            
            $("#messageArea").on("submit", function(event) {
                event.preventDefault();
                
                const date = new Date();
                const hour = date.getHours().toString().padStart(2, '0');
                const minute = date.getMinutes().toString().padStart(2, '0');
                const str_time = hour + ":" + minute;
                var rawText = $("#text").val().trim();
                
                if (!rawText) {
                    return;
                }
                
                // Hiển thị tin nhắn của user
                var userHtml = '<div class="d-flex justify-content-end mb-4">' +
                               '<div class="msg_cotainer_send">' + rawText + 
                               '<span class="msg_time_send">'+ str_time + '</span></div>' +
                               '<div class="img_cont_msg">' +
                               '<img src="https://i.ibb.co/d5b84Xw/Untitled-design.png" class="rounded-circle user_img_msg">' +
                               '</div></div>';
                
                $("#text").val("");
                $("#messageFormeight").append(userHtml);
                $('.msg_card_body').scrollTop($('.msg_card_body')[0].scrollHeight);
                
                // Gửi request đến FastAPI endpoint
                $.ajax({
                    url: "/chat",  
                    type: "POST",
                    contentType: "application/json",
                    data: JSON.stringify({ 
                    message: rawText,
                    thread_id: "default_thread_id"  
                    }),
                    dataType: "json",
                    success: function(data) {
                        // Lấy response từ FastAPI
                        const botResponse = data.response || data;
                        
                        var botHtml = '<div class="d-flex justify-content-start mb-4">' +
                                      '<div class="img_cont_msg">' +
                                      '<img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img_msg">' +
                                      '</div>' +
                                      '<div class="msg_cotainer">' + botResponse + 
                                      '<span class="msg_time">' + str_time + '</span></div></div>';
                        
                        $("#messageFormeight").append(botHtml);
                        $('.msg_card_body').scrollTop($('.msg_card_body')[0].scrollHeight);
                    },
                    error: function(xhr, status, error) {
                        console.error("Error:", error);
                        
                        var errorHtml = '<div class="d-flex justify-content-start mb-4">' +
                                        '<div class="img_cont_msg">' +
                                        '<img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img_msg">' +
                                        '</div>' +
                                        '<div class="msg_cotainer">' + 
                                        'Sorry, there was an error processing your request. Please try again.' +
                                        '<span class="msg_time">' + str_time + '</span></div></div>';
                        
                        $("#messageFormeight").append(errorHtml);
                        $('.msg_card_body').scrollTop($('.msg_card_body')[0].scrollHeight);
                    }
                });
            });
            
            // Cho phép gửi bằng Enter
            $("#text").keypress(function(e) {
                if (e.which === 13 && !e.shiftKey) {
                    e.preventDefault();
                    $("#messageArea").submit();
                }
            });
            
            // Focus vào input khi click vào chat
            $('.msg_card_body').click(function() {
                $("#text").focus();
            });
        });
    </script>
</body>
</html>
