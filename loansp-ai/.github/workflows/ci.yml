Set-Content -Path "E:\work\MB\LoanSP\loansp\.github\workflows\ci.yml" -Value @'
name: CI

on:
  push:
    branches: [main, master]
    paths:
      - "loansp-ai/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "loansp-ai/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: loansp-ai

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: loansp-ai/backend/requirements.txt
           
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest httpx
          pip install -r backend/requirements.txt

      - name: Lint with Ruff
        run: |
          ruff check backend/ --output-format=github
          ruff format backend/ --check

      - name: Run tests
        run: pytest test/ -v --tb=short
        env:
          GROQ_API: ${{ secrets.GROQ_API || 'dummy-key-for-ci' }}
          ENVIRONMENT: test

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -f backend/Dockerfile --target runtime -t loansp-chatbot:ci .

      - name: Test container health
        run: |
          # Create a minimal .env for the container
          echo "GROQ_API=${{ secrets.GROQ_API || 'dummy-key-for-ci' }}" > .env
          echo "ENVIRONMENT=test" >> .env
          echo "MODEL_NAME=openai/gpt-oss-20b" >> .env

          # Run container in background
          docker run -d --name test-chatbot -p 8000:8000 --env-file .env loansp-chatbot:ci

          # Wait for health endpoint (max 60s)
          for i in {1..30}; do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Health check passed"
              exit 0
            fi
            sleep 2
          done

          echo "Health check failed"
          docker logs test-chatbot
          exit 1

      - name: Cleanup
        if: always()
        run: |
          docker stop test-chatbot || true
          docker rm test-chatbot || true
'@