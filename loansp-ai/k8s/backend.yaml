apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: hoangee2/loansp-backend:v1
        ports:
        - containerPort: 8000
        env:
        - name: ENVIRONMENT
          value: production
        - name: REDIS_HOST
          value: redis
        - name: REDIS_PORT
          value: '6379'
        - name: LOAN_CALC_MCP_URL
          value: http://loan-calc-mcp:8000/sse
        - name: PRODUCT_MCP_URL
          value: http://product-mcp:8000/sse
        - name: KNOWLEDGE_MCP_URL
          value: http://knowledge-mcp:8000/sse
        - name: GROQ_API
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: GROQ_API
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 40
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
  - port: 8000
    targetPort: 8000
  type: NodePort
